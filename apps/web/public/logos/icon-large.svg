<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

<!-- Background -->
<rect width="64" height="64" rx="16" fill="#5B4FCF"></rect>

<!-- Wallet -->
<rect x="12" y="24" width="40" height="26" rx="7" fill="white"></rect>

<!-- Wallet flap -->
<rect x="12" y="18" width="18" height="8" rx="4" fill="#EDE9FF"></rect>

<!-- Split lines (representing auto allocation) -->
<line x1="22" y1="24" x2="22" y2="50" stroke="#5B4FCF" stroke-width="2"></line>
<line x1="32" y1="24" x2="32" y2="50" stroke="#5B4FCF" stroke-width="2"></line>
<line x1="42" y1="24" x2="42" y2="50" stroke="#5B4FCF" stroke-width="2"></line>

<!-- Money indicator -->
<circle cx="46" cy="37" r="3" fill="#5B4FCF"></circle>

</svg>